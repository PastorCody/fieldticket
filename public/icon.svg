<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#1a1a2e"/>
  <g transform="translate(256,220)">
    <!-- Clipboard body -->
    <rect x="-80" y="-60" width="160" height="200" rx="12" fill="#2d2d4e" stroke="#ff6b35" stroke-width="6"/>
    <!-- Clipboard clip -->
    <rect x="-30" y="-80" width="60" height="40" rx="8" fill="#ff6b35"/>
    <!-- Lines on clipboard -->
    <line x1="-50" y1="-10" x2="50" y2="-10" stroke="#666" stroke-width="5" stroke-linecap="round"/>
    <line x1="-50" y1="20" x2="30" y2="20" stroke="#666" stroke-width="5" stroke-linecap="round"/>
    <line x1="-50" y1="50" x2="40" y2="50" stroke="#666" stroke-width="5" stroke-linecap="round"/>
    <line x1="-50" y1="80" x2="20" y2="80" stroke="#666" stroke-width="5" stroke-linecap="round"/>
    <!-- Check marks -->
    <path d="-60,-10 -55,-5 -45,-15" fill="none" stroke="#ff6b35" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Mic icon overlay -->
  <g transform="translate(340,360)">
    <circle cx="0" cy="0" r="50" fill="#ff6b35"/>
    <rect x="-12" y="-28" width="24" height="36" rx="12" fill="white"/>
    <path d="M-20,4 C-20,22 -2,36 0,36 C2,36 20,22 20,4" fill="none" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <line x1="0" y1="36" x2="0" y2="46" stroke="white" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
